<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Reiseblogger - Visitenkarte</title>

    
    <style>

                .main-nav {
            display: flex;
            justify-content: space-around; /* oder flex-start, center etc. */
            background-color: rgba(226, 43, 134, 0.6);
            padding: 10px;
                    /* Diese Eigenschaften sorgen dafür, dass die Leiste oben fixiert wird */
            position: fixed; /* Fixiert das Element relativ zum Viewport */
            top: 0;          /* Platziert es am oberen Rand */
            left: 0;         /* Platziert es am linken Rand */
            width: 100%;     /* Lässt es die gesamte Breite einnehmen */
            z-index: 1000;   /* Stellt sicher, dass es über anderem Inhalt liegt */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); /* Optional: leichter Schatten für Tiefe */
        }
        .main-nav a {
            color: white;
            text-decoration: none;
        } 

        a:hover {
            text-decoration: underline;

            } 

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; /* Flexbox für Zentrierung auf der Seite */
            justify-content: center; /* Horizontal zentrieren */
            align-items: center; /* Vertikal zentrieren */
            min-height: 100vh; /* Mindesthöhe des Viewports */
            background-image: url("https://bit.ly/43Kdzup"); /* The image used */
            height: 100%; /* Full height */
            flex-direction: column;       /* Elemente werden vertikal gestapelt */
            padding-top: 60px;            /* Platz für die fixierte Navigationsleiste (wenn du sie weiterhin fixed haben willst) */
            background-attachment: fixed; /* Create the parallax scrolling effect */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            margin: 0;
        }

        .visitenkarte {
            width: 300px; /* Breite der Visitenkarte */
            padding: 20px; /* Innenabstand zwischen Inhalt und Rand */
            border: 2px solid #e22b86; /* Rand: Dicke, Stil, Farbe (Japan-Rot) */
            margin: auto; /* Außenabstand, 'auto' zentriert horizontal bei gesetzter Breite */
            background-color: rgba(255, 255, 255, 0.6); /* Hintergrundfarbe mit Transparenz */
            text-align: center; /* Text zentrieren */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Leichter Schatten */
            border-radius: 10px; /* Abgerundete Ecken */
        }

        .visitenkarte h2 {
            color: #000000;
            margin-top: 0; /* Kein oberer Außenabstand für die Überschrift */
            margin-bottom: 10px; /* Abstand unter der Überschrift */
        }

        .visitenkarte p {
            color: #000000;
            font-size: 0.9em;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .visitenkarte .profile-img {
            width: 80px; /* Breite des Bildes */
            height: 80px; /* Höhe des Bildes */
            border-radius: 50%; /* Rundes Bild */
            object-fit: cover; /* Bildausschnitt anpassen */
            margin-bottom: 15px; /* Abstand unter dem Bild */
            border: 3px solid #e22b86; /* Kleiner roter Rand um das Bild */
        }

        .visitenkarte .contact-info a {
            color: #e22b86;;
            text-decoration: none;
            margin: 0 5px;
            font-size: 0.9em;
        }

        .visitenkarte .contact-info a:hover {
            text-decoration: underline;
        }

        footer {
    color: white;
    text-align: center;
    padding: 15px 0;
    flex-shrink: 0; /* Stellt sicher, dass der Footer nicht schrumpft, wenn der Platz begrenzt ist */
}
    </style>


</head>
<body>

    <nav class="main-nav">
    <a href=".\index.html">Home</a>
    
    </nav>


    <div class="visitenkarte">
        <img src="http://bit.ly/4kqi6rD" alt="Profilbild Japan Reiseblogger" class="profile-img">

        <h2>Max Px</h2>
        <p>Japan Reiseblogger</p>
        <p>"Erkunde Japan mit mir – von den neonhellen Straßen Tokios bis zu den spirituellen Gipfeln Koyasans."</p>

        <div class="contact-info">

            <a href="[URL_ZU_DEINEM_BLOG]" target="_blank">Blog</a> |
            <a href="[URL_ZU_DEINEM_SOCIAL_MEDIA]" target="_blank">Social Media</a>
        </div>
    </div>

</body>
<footer>
  <p><small>&copy; [2025] Max Px</small></p>
</footer>
</html>
